name: 每日輪胎價格更新

on:
  schedule:
    - cron: '0 1 * * *'    # 台灣時間 早上 09:00
    - cron: '0 12 * * *'   # 台灣時間 晚上 20:00
  workflow_dispatch:         # 允許手動執行

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下載倉庫程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install requests

      - name: 執行爬蟲
        run: python scraper.py

      - name: 儲存 prices.json 回倉庫
        run: |
          git config user.name "TireWatch Bot"
          git config user.email "bot@tirewatch.local"
          git add prices.json
          git diff --staged --quiet || git commit -m "自動更新價格 $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
